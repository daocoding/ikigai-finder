<svg viewBox="0 0 880 670" xmlns="http://www.w3.org/2000/svg" font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#6FB4E6"/><stop offset="1" stop-color="#4A8FCC"/></radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#9CCDF0" stop-opacity="0.55"/><stop offset="1" stop-color="#9CCDF0" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="0" y="0" width="880" height="670" fill="#FFFFFF"/>

  <g stroke="#C4CAD2" stroke-width="1.6" stroke-dasharray="4 5">
    <line x1="440" y1="335" x2="440" y2="118"/>
    <line x1="440" y1="335" x2="720" y2="320"/>
    <line x1="440" y1="335" x2="440" y2="560"/>
    <line x1="440" y1="335" x2="160" y2="320"/>
  </g>

  <!-- People & change (top) -->
  <ellipse cx="440" cy="118" rx="155" ry="94" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="440" y="50" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">People &amp; change</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="347" y="75"  width="186" height="26" rx="13" fill="#FFF" stroke="#E0A23E"/><text x="440" y="92"  fill="#C2812A">How people learn</text>
    <rect x="347" y="105" width="186" height="26" rx="13" fill="#FFF" stroke="#E0A23E"/><text x="440" y="122" fill="#C2812A">Mentoring transitions</text>
    <rect x="347" y="135" width="186" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="152" fill="#4A8FCC">Adult reskilling</text>
  </g>

  <!-- Technology (right) -->
  <ellipse cx="720" cy="320" rx="120" ry="74" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="720" y="268" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Technology</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="628" y="289" width="184" height="26" rx="13" fill="#FFF" stroke="#E0A23E"/><text x="720" y="306" fill="#C2812A">AI as amplifier</text>
    <rect x="628" y="319" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="720" y="336" fill="#4A8FCC">Developer tools</text>
  </g>

  <!-- Craft & character (bottom) -->
  <ellipse cx="440" cy="562" rx="155" ry="72" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="440" y="512" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Craft &amp; character</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="347" y="533" width="186" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="550" fill="#4A8FCC">Mastery &amp; deep work</text>
    <rect x="347" y="563" width="186" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="580" fill="#4A8FCC">Self-cultivation</text>
  </g>

  <!-- Immigrant path (left) -->
  <ellipse cx="160" cy="320" rx="122" ry="74" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="160" y="268" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Immigrant path</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="66" y="289" width="188" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="160" y="306" fill="#4A8FCC">Navigating a new culture</text>
    <rect x="66" y="319" width="188" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="160" y="336" fill="#4A8FCC">The unwritten rules</text>
  </g>

  <!-- center -->
  <ellipse cx="440" cy="335" rx="92" ry="64" fill="url(#halo)"/>
  <ellipse cx="440" cy="335" rx="70" ry="49" fill="url(#core)" stroke="#FFFFFF" stroke-width="2"/>
  <text x="440" y="329" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">What pulls</text>
  <text x="440" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Wei</text>

  <text x="440" y="652" text-anchor="middle" font-size="11.5" font-style="italic" fill="#C2812A">amber = a pull he can't stop thinking about</text>
</svg>
