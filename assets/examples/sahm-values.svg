<svg viewBox="0 0 880 660" xmlns="http://www.w3.org/2000/svg" font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#6FB4E6"/><stop offset="1" stop-color="#4A8FCC"/></radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#9CCDF0" stop-opacity="0.55"/><stop offset="1" stop-color="#9CCDF0" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="0" y="0" width="880" height="660" fill="#FFFFFF"/>

  <g stroke="#C4CAD2" stroke-width="1.6" stroke-dasharray="4 5">
    <line x1="440" y1="330" x2="440" y2="110"/>
    <line x1="440" y1="330" x2="165" y2="235"/>
    <line x1="440" y1="330" x2="715" y2="235"/>
    <line x1="440" y1="330" x2="675" y2="535"/>
    <line x1="440" y1="330" x2="210" y2="540"/>
  </g>

  <!-- Nurturing growth (top) -->
  <ellipse cx="440" cy="110" rx="122" ry="88" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="440" y="46" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Nurturing growth</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="354" y="69"  width="172" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="86"  fill="#4A8FCC">Watch people grow</text>
    <rect x="354" y="99"  width="172" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="116" fill="#4A8FCC">Help things flourish</text>
    <rect x="354" y="129" width="172" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="440" y="146" fill="#4A8FCC">Pour into something</text>
  </g>

  <!-- Care (left) -->
  <ellipse cx="165" cy="235" rx="108" ry="90" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="165" y="171" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Care</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="73" y="194" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="165" y="211" fill="#4A8FCC">Be the steady anchor</text>
    <rect x="73" y="224" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="165" y="241" fill="#4A8FCC">Show up in a crisis</text>
    <rect x="73" y="254" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="165" y="271" fill="#4A8FCC">Tend to people</text>
  </g>

  <!-- Courage (right) -->
  <ellipse cx="715" cy="235" rx="108" ry="78" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="715" y="183" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Courage</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="626" y="208" width="178" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="715" y="225" fill="#4A8FCC">It's not too late</text>
    <rect x="626" y="238" width="178" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="715" y="255" fill="#4A8FCC">Begin again</text>
  </g>

  <!-- Belonging (bottom-right) -->
  <ellipse cx="675" cy="535" rx="110" ry="90" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="675" y="471" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Belonging</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="583" y="494" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="675" y="511" fill="#4A8FCC">Make people feel at home</text>
    <rect x="583" y="524" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="675" y="541" fill="#4A8FCC">Bring people together</text>
    <rect x="583" y="554" width="184" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="675" y="571" fill="#4A8FCC">No one left out</text>
  </g>

  <!-- Something of my own (bottom-left) -->
  <ellipse cx="210" cy="540" rx="105" ry="72" fill="#F1F3F6" stroke="#DADFE5"/>
  <text x="210" y="494" text-anchor="middle" font-size="18" font-weight="600" fill="#8A909A">Something of my own</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="120" y="513" width="180" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="210" y="530" fill="#4A8FCC">Stop erasing myself</text>
    <rect x="120" y="545" width="180" height="26" rx="13" fill="#FFF" stroke="#BBD8EE"/><text x="210" y="562" fill="#4A8FCC">A life that's mine</text>
  </g>

  <!-- center -->
  <ellipse cx="440" cy="330" rx="96" ry="66" fill="url(#halo)"/>
  <ellipse cx="440" cy="330" rx="74" ry="51" fill="url(#core)" stroke="#FFFFFF" stroke-width="2"/>
  <text x="440" y="324" text-anchor="middle" font-size="16.5" font-weight="700" fill="#FFFFFF">Susan's</text>
  <text x="440" y="346" text-anchor="middle" font-size="16.5" font-weight="700" fill="#FFFFFF">Values</text>
</svg>
