<svg viewBox="0 0 760 760" xmlns="http://www.w3.org/2000/svg" font-family="'Avenir Next','Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0D1B2A"/><stop offset="1" stop-color="#1B263B"/></linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FDCB6E" stop-opacity="0.55"/><stop offset="1" stop-color="#FDCB6E" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="0" y="0" width="760" height="760" rx="26" fill="url(#bg)"/>

  <!-- four circles in diamond: Love top, Talent left, World Needs right, Values bottom -->
  <g style="mix-blend-mode:screen" stroke-width="2">
    <circle cx="380" cy="250" r="195" fill="#FFB3BA" fill-opacity="0.30" stroke="#FFB3BA" stroke-opacity="0.55"/>
    <circle cx="240" cy="390" r="195" fill="#88D8F4" fill-opacity="0.30" stroke="#88D8F4" stroke-opacity="0.55"/>
    <circle cx="520" cy="390" r="195" fill="#66BF8C" fill-opacity="0.30" stroke="#66BF8C" stroke-opacity="0.55"/>
    <circle cx="380" cy="530" r="195" fill="#A8E6CF" fill-opacity="0.30" stroke="#A8E6CF" stroke-opacity="0.55"/>
  </g>

  <!-- category labels (in each circle's outer lobe) -->
  <g text-anchor="middle" font-weight="700" font-size="17" letter-spacing="1">
    <text x="380" y="118" fill="#FFB3BA">LOVE</text>
    <text x="138" y="396" fill="#88D8F4">TALENT</text>
    <text x="622" y="396" fill="#66BF8C">WORLD NEEDS</text>
    <text x="380" y="668" fill="#A8E6CF">VALUES</text>
  </g>

  <!-- intersection labels (canonical) -->
  <g text-anchor="middle" font-size="13.5" font-weight="600" letter-spacing="0.5"
     paint-order="stroke" stroke="#0D1B2A" stroke-width="2.5" stroke-linejoin="round" fill="#E7A93C">
    <text x="291" y="322">Passion</text>
    <text x="469" y="322">Mission</text>
    <text x="291" y="466">Profession</text>
    <text x="469" y="466">Vocation</text>
  </g>

  <!-- center: Ikigai -->
  <circle cx="380" cy="390" r="62" fill="url(#coreGlow)"/>
  <text x="380" y="397" text-anchor="middle" font-size="22" font-weight="800" letter-spacing="1"
        fill="#FDCB6E" paint-order="stroke" stroke="#0D1B2A" stroke-width="3.5" stroke-linejoin="round">Ikigai</text>
</svg>
