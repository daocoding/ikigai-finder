<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="'Avenir Next','Helvetica Neue',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#1B263B"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FDCB6E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FDCB6E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dark background -->
  <rect x="0" y="0" width="600" height="600" rx="28" fill="url(#bg)"/>

  <!-- four overlapping pillars (screen blend → luminous overlaps on the dark field) -->
  <g style="mix-blend-mode:screen" stroke-width="2">
    <circle cx="222" cy="222" r="180" fill="#FFB3BA" fill-opacity="0.30" stroke="#FFB3BA" stroke-opacity="0.55"/> <!-- Love -->
    <circle cx="378" cy="222" r="180" fill="#88D8F4" fill-opacity="0.30" stroke="#88D8F4" stroke-opacity="0.55"/> <!-- Talent -->
    <circle cx="222" cy="378" r="180" fill="#A8E6CF" fill-opacity="0.30" stroke="#A8E6CF" stroke-opacity="0.55"/> <!-- Value -->
    <circle cx="378" cy="378" r="180" fill="#66BF8C" fill-opacity="0.30" stroke="#66BF8C" stroke-opacity="0.55"/> <!-- Needs -->
  </g>

  <!-- pillar labels (in each circle's outer lobe) -->
  <g font-weight="700" font-size="25" text-anchor="middle">
    <text x="150" y="156" fill="#FFB3BA">Love</text>
    <text x="450" y="156" fill="#88D8F4">Talent</text>
    <text x="150" y="462" fill="#A8E6CF">Value</text>
    <text x="450" y="462" fill="#66BF8C">Needs</text>
  </g>

  <!-- intersection labels -->
  <g font-weight="600" font-size="15" letter-spacing="0.5" text-anchor="middle"
     paint-order="stroke" stroke="#0D1B2A" stroke-width="2.5" stroke-linejoin="round">
    <text x="300" y="138" fill="#F6A6B6">Passion</text>      <!-- Love + Talent -->
    <text x="150" y="305" fill="#E59BB4">Mission</text>      <!-- Love + Value -->
    <text x="450" y="305" fill="#9FB3D9">Profession</text>   <!-- Talent + Needs -->
    <text x="300" y="478" fill="#86D6A6">Vocation</text>     <!-- Value + Needs -->
  </g>

  <!-- center: Ikigai -->
  <circle cx="300" cy="300" r="78" fill="url(#coreGlow)"/>
  <text x="300" y="308" text-anchor="middle" font-size="30" font-weight="800" letter-spacing="0.5"
        fill="#FDCB6E" paint-order="stroke" stroke="#0D1B2A" stroke-width="3.5" stroke-linejoin="round">Ikigai</text>
</svg>
